# AI Assistant Configuration

model:
  name: "llama-3.3-70b-versatile"
  temperature: 0.2
  max_tokens: 1024

embeddings:
  model_name: "sentence-transformers/all-MiniLM-L6-v2"

data:
  data_dir: "data"
  pdf_path: "data/owlflow-web-text.pdf"
  kb_path: "data/knowledge_base.json"
  qa_path: "data/qa_pairs.json"

retrieval:
  collection_name: "business_kb"
  top_k: 5
  chunk_size: 1000
  chunk_overlap: 200

paths:
  data_dir: "data"
  vectorstore_dir: "vectorstore"
  log_file: "logs/app.log"

business:
  name: "Owlflow"
  owner: "Vinay"
  contact_email: "vpj@example.com"

# Agentic Performance Parameters
intent:
  small_model: "llama-3.1-8b-instant"
  buying_threshold: 0.65

lead_extraction:
  model: "llama-3.3-70b-versatile"
  fields: ["full_name", "email", "phone", "use_case"]
